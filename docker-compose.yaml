services:
  database:
    image: 'mysql:8'
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_DATABASE: c2
    networks:
      - mysql-network
    volumes:
      - ./db-data/:/var/lib/mysql/
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

networks:
  mysql-network:
    driver: bridge